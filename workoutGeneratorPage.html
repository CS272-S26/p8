<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Generator</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.3.0/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="styles.css" rel="stylesheet" />
    <link href="workoutGeneratorPage.css" rel="stylesheet" />
</head>

<body class="m-2">
    <!-- Navbar -->
    <style>
    .navbar {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #333333;
    }
    .navbar li {
        float: left;
        list-style-type: none;
    }
    .navbar li a {
        display: block;
        color: white;
        text-align: center;
        padding: 14px 16px;
        text-decoration: none;
    }
    .navbar li a:hover {
        background-color: #111111;
    }
    .navbar li a.active {
        background-color: #111111;
    }
    </style>

    <ul class="navbar">
        <li><a href="index.html">Home</a></li>
        <li><a href="chestPage.html">Chest</a></li>
        <li><a href="backPage.html">Back</a></li>
        <li><a href="shouldersPage.html">Shoulders</a></li>
        <li><a href="armsPage.html">Arms</a></li>
        <li><a href="legsPage.html">Legs</a></li>
        <li><a href="corePage.html">Core</a></li>
        <li><a href="favoritesPage.html">Favorites</a></li>
        <li><a href="workoutGeneratorPage.html" class="active">Generator</a></li>
    </ul>

    <h1>Workout Generator</h1>
    <p>Select your muscle groups, equipment, and how many exercises per group.</p>

    <div class="container-fluid mt-3">
        <div class="row">

            <!-- Left column: inputs -->
            <div class="col-12 col-md-4">

                <!-- Muscle group checkboxes -->
                <fieldset class="mb-3">
                    <legend>Muscle Groups</legend>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="chest" id="muscle-chest">
                        <label class="form-check-label" for="muscle-chest">Chest</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="back" id="muscle-back">
                        <label class="form-check-label" for="muscle-back">Back</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="shoulders" id="muscle-shoulders">
                        <label class="form-check-label" for="muscle-shoulders">Shoulders</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="arms" id="muscle-arms">
                        <label class="form-check-label" for="muscle-arms">Arms</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="legs" id="muscle-legs">
                        <label class="form-check-label" for="muscle-legs">Legs</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="core" id="muscle-core">
                        <label class="form-check-label" for="muscle-core">Core</label>
                    </div>
                </fieldset>

                <!-- Equipment -->
                <fieldset class="mb-3">
                    <legend>Equipment Available</legend>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="Bodyweight" id="eq-bodyweight" checked>
                        <label class="form-check-label" for="eq-bodyweight">Bodyweight</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="Barbell" id="eq-barbell" checked>
                        <label class="form-check-label" for="eq-barbell">Barbell</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="Dumbbells" id="eq-dumbbells" checked>
                        <label class="form-check-label" for="eq-dumbbells">Dumbbells</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="Cable Machine" id="eq-cable" checked>
                        <label class="form-check-label" for="eq-cable">Cable Machine</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="Pull-Up Bar" id="eq-pullupbar" checked>
                        <label class="form-check-label" for="eq-pullupbar">Pull-Up Bar</label>
                    </div>
                </fieldset>

                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" id="include-favorites">
                    <label class="form-check-label" for="include-favorites">Include favorite exercises</label>
                </div>

                <!-- Number of exercises per muscle group -->
                <div class="mb-3">
                    <label for="num-exercises" class="form-label">Exercises per muscle group</label>
                    <input type="number" class="form-control" id="num-exercises" min="1" max="5" value="2">
                </div>

                <button class="btn btn-dark w-100" id="generate-btn">Generate Workout</button>
            </div>

            <div class="col-12 col-md-8" id="workout-output">
                <p class="text-muted">Your workout will appear here.</p>
            </div>

        </div>
    </div>

    <script src="workoutGeneratorPage.js" defer></script>
</body>

</html>
